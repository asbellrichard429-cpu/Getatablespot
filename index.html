<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GetATableSpot — Find Your Next Great Meal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0F0D0A; --paper:#FAF8F4; --warm:#F5F0E8;
  --gold:#C9A84C; --gold-light:#E8D5A3; --gold-dark:#8B6914;
  --ember:#E85D3A; --sage:#4A7C59; --slate:#4A5568;
  --border:#E2DDD5; --border-dark:#C8C0B4;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh}
header{background:var(--ink);position:sticky;top:0;z-index:200}
.header-top{max-width:1280px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:16px}
.logo{font-family:var(--serif);font-size:1.5rem;font-weight:900;color:var(--paper);display:flex;align-items:center;gap:10px;white-space:nowrap}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);display:inline-block}
.search-bar{flex:1;max-width:640px;display:flex;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:6px;overflow:hidden}
.search-bar input{flex:1;background:none;border:none;outline:none;padding:10px 16px;color:var(--paper);font-family:var(--sans);font-size:.9rem}
.search-bar input::placeholder{color:rgba(255,255,255,.4)}
.search-bar .divider-v{width:1px;background:rgba(255,255,255,.12);flex-shrink:0}
.location-input{width:160px;background:none;border:none;outline:none;padding:10px 12px;color:rgba(255,255,255,.8);font-family:var(--sans);font-size:.82rem;flex-shrink:0}
.location-input::placeholder{color:rgba(255,255,255,.4)}
.btn-search{background:var(--gold);color:var(--ink);border:none;padding:0 20px;font-family:var(--sans);font-weight:600;font-size:.85rem;cursor:pointer;white-space:nowrap}
.header-actions{display:flex;align-items:center;gap:10px;margin-left:auto}
.btn-hdr{padding:8px 16px;border-radius:4px;font-family:var(--sans);font-weight:500;font-size:.83rem;cursor:pointer;border:none;white-space:nowrap}
.btn-restaurants{background:rgba(255,255,255,.08);color:var(--paper);border:1px solid rgba(255,255,255,.15)}
.btn-restaurants:hover{background:rgba(255,255,255,.14)}
.btn-pro-hdr{background:var(--gold);color:var(--ink);font-weight:600}
.cuisine-nav{background:var(--warm);border-bottom:1px solid var(--border)}
.cuisine-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:2px;overflow-x:auto;height:48px;scrollbar-width:none}
.cuisine-inner::-webkit-scrollbar{display:none}
.cuisine-btn{padding:6px 16px;border-radius:3px;border:none;background:none;font-family:var(--sans);font-size:.82rem;font-weight:500;color:var(--slate);cursor:pointer;white-space:nowrap}
.cuisine-btn.active{background:var(--ink);color:var(--paper)}
.main{max-width:1280px;margin:0 auto;padding:32px 24px}
.pro-strip{background:linear-gradient(135deg,var(--ink),#2A2218);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:14px 20px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.pro-strip h4{color:var(--paper);font-size:.9rem;font-weight:600;margin-bottom:2px}
.pro-strip p{color:rgba(255,255,255,.5);font-size:.78rem}
.btn-strip-pro{padding:8px 18px;background:var(--gold);color:var(--ink);border:none;border-radius:4px;font-family:var(--sans);font-weight:600;font-size:.82rem;cursor:pointer;white-space:nowrap}
.filter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:12px;flex-wrap:wrap}
.filter-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-pill{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:4px;border:1px solid var(--border);background:white;font-size:.82rem;font-weight:500;cursor:pointer;color:var(--slate)}
.filter-pill.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.filter-pill select{background:none;border:none;outline:none;font-family:var(--sans);font-size:.82rem;font-weight:500;cursor:pointer;color:inherit}
.result-meta{font-size:.82rem;color:var(--slate)}
.result-meta strong{color:var(--ink);font-weight:600}
.sort-sel{padding:7px 12px;border:1px solid var(--border);border-radius:4px;font-family:var(--sans);font-size:.82rem;background:white;cursor:pointer;outline:none}
.restaurants-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}
.r-card{background:white;border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;animation:fadeUp .3s ease both;position:relative}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.r-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(15,13,10,.12)}
.r-card.is-featured{border-color:var(--gold-light)}
.r-card-img{height:200px;position:relative;overflow:hidden;background:#1A1A1A;display:flex;align-items:center;justify-content:center;font-size:5rem}
.r-card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.r-featured-tag{position:absolute;top:12px;left:12px;background:var(--gold);color:var(--ink);font-size:.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:2px;z-index:2}
.r-wait-tag{position:absolute;top:12px;right:12px;border-radius:4px;padding:5px 10px;font-weight:600;font-size:.75rem;display:flex;align-items:center;gap:5px;z-index:2;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2)}
.wt-none{background:rgba(15,15,15,.7);color:#7EBD8E}
.wt-low{background:rgba(15,15,15,.7);color:#A8D5B5}
.wt-med{background:rgba(15,15,15,.7);color:#E8C97A}
.wt-high{background:rgba(15,15,15,.7);color:#F0896A}
.wt-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.r-save-btn{position:absolute;bottom:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;z-index:2}
.r-body{padding:16px 18px 18px}
.r-sources{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.r-src{font-size:.65rem;font-weight:600;padding:2px 6px;border-radius:2px}
.rs-yelp{background:#FFF0F0;color:#C41200}
.rs-google{background:#EEF3FF;color:#1557BF}
.rs-opentable{background:#EDF8F1;color:#1D6B3A}
.rs-resy{background:#FFF4EE;color:#C45000}
.rs-tock{background:#F0F0F0;color:#333}
.r-cuisine{font-size:.7rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
.r-name{font-family:var(--serif);font-size:1.2rem;font-weight:700;line-height:1.25;margin-bottom:8px}
.r-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.r-stars{color:var(--gold-dark);font-size:.85rem}
.r-price{font-size:.82rem;font-weight:600;color:var(--sage)}
.r-dist{font-size:.77rem;color:var(--slate)}
.r-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.r-tag{padding:3px 8px;border-radius:2px;background:var(--warm);border:1px solid var(--border);font-size:.72rem;color:var(--slate)}
.r-actions{display:flex;gap:8px}
.btn-book{flex:1;padding:9px 14px;background:var(--ink);color:var(--paper);border:none;border-radius:4px;font-family:var(--sans);font-weight:500;font-size:.83rem;cursor:pointer}
.btn-book.gold{background:var(--gold);color:var(--ink)}
.btn-sm{padding:9px 12px;border-radius:4px;background:var(--warm);border:1px solid var(--border);cursor:pointer;font-size:.82rem;color:var(--slate)}
.overlay{display:none;position:fixed;inset:0;background:rgba(15,13,10,.65);backdrop-filter:blur(6px);z-index:500;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
@media(min-width:600px){.overlay{align-items:center}}
.modal{background:white;width:100%;max-width:580px;max-height:95vh;border-radius:12px 12px 0 0;overflow-y:auto;box-shadow:0 24px 80px rgba(15,13,10,.25);animation:slideUp .3s ease}
@media(min-width:600px){.modal{border-radius:12px}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hero{height:180px;background:#1A1A1A;position:relative;display:flex;align-items:center;justify-content:center;font-size:5rem;overflow:hidden}
.modal-hero img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.modal-close{position:absolute;top:14px;right:14px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(15,13,10,.5);border:none;color:white;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.modal-body{padding:24px}
.modal-r-name{font-family:var(--serif);font-size:1.4rem;font-weight:700;margin-bottom:4px}
.modal-cuisine{font-size:.72rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--slate);margin-bottom:12px}
.modal-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.m-info-box{background:var(--warm);border:1px solid var(--border);border-radius:6px;padding:11px 13px}
.m-info-label{font-size:.68rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--slate);margin-bottom:3px}
.m-info-val{font-size:.88rem;font-weight:500}
.wait-box{background:var(--warm);border:1px solid var(--border);border-radius:6px;padding:13px 16px;display:flex;align-items:center;gap:14px;margin-bottom:16px}
.wb-label{font-size:.68rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--slate);margin-bottom:2px}
.wb-val{font-size:1rem;font-weight:600}
.wb-green{color:var(--sage)}.wb-yellow{color:#8B6914}.wb-red{color:var(--ember)}
.divider{height:1px;background:var(--border);margin:16px 0}
.section-head{font-family:var(--serif);font-size:1rem;font-weight:700;margin-bottom:12px}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.t-btn{padding:9px 6px;border:1px solid var(--border);border-radius:4px;font-family:var(--sans);font-size:.8rem;font-weight:500;cursor:pointer;background:white;text-align:center;transition:all .15s}
.t-btn:hover,.t-btn.sel{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.t-btn.full{background:var(--warm);color:var(--border-dark);cursor:not-allowed;text-decoration:line-through}
.party-sel{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.party-ctrl{display:flex;align-items:center;gap:8px}
.p-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:white;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.p-num{font-size:1.1rem;font-weight:600;min-width:24px;text-align:center}
.field-lbl{display:block;font-size:.78rem;font-weight:600;color:var(--slate);margin-bottom:4px}
.field-in{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:4px;font-family:var(--sans);font-size:.9rem;margin-bottom:12px;outline:none}
.field-in:focus{border-color:var(--ink)}
.yelp-rev{border:1px solid var(--border);border-radius:6px;padding:12px 14px;margin-bottom:8px}
.yr-stars{color:var(--gold-dark);font-size:.82rem;margin-bottom:5px}
.yr-text{font-size:.83rem;font-family:var(--serif);font-style:italic;line-height:1.5}
.yr-author{font-size:.73rem;color:var(--slate);margin-top:6px}
.btn-confirm{width:100%;padding:14px;background:var(--ink);color:var(--paper);border:none;border-radius:4px;font-family:var(--sans);font-weight:600;font-size:.95rem;cursor:pointer;margin-top:4px}
.skel{background:white;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.skel-img{height:200px;background:linear-gradient(90deg,#F0EBE0 25%,#FAF7F2 50%,#F0EBE0 75%);background-size:200% 100%;animation:shim 1.4s infinite}
@keyframes shim{0%{background-position:100%}100%{background-position:-100%}}
.skel-body{padding:16px 18px}
.skel-line{height:13px;border-radius:3px;background:linear-gradient(90deg,#F0EBE0 25%,#FAF7F2 50%,#F0EBE0 75%);background-size:200% 100%;animation:shim 1.4s infinite;margin-bottom:10px}
.skel-line.s60{width:60%}.skel-line.s40{width:40%}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--paper);padding:11px 22px;border-radius:4px;font-size:.85rem;font-weight:500;z-index:999;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.empty{text-align:center;padding:72px 24px;color:var(--slate)}
.empty-title{font-family:var(--serif);font-size:1.5rem;margin-bottom:8px;color:var(--ink)}
@media(max-width:768px){
  .header-top{flex-wrap:wrap;height:auto;padding:12px 16px;gap:10px}
  .search-bar{order:3;flex:0 0 100%;max-width:100%}
  .restaurants-grid{grid-template-columns:1fr}
  .time-grid{grid-template-columns:repeat(3,1fr)}
  .modal-info-grid{grid-template-columns:1fr}
  .location-input{width:120px}
}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo"><span class="logo-dot"></span>GetATableSpot</div>
    <div class="search-bar">
      <input id="searchInput" type="text" placeholder="Restaurant, cuisine…" oninput="onSearch()" onkeydown="if(event.key==='Enter')doSearch()">
      <div class="divider-v"></div>
      <input id="locationInput" class="location-input" type="text" placeholder="City or address…" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn-search" onclick="doSearch()">Search</button>
    </div>
    <div class="header-actions">
      <button class="btn-hdr btn-restaurants" onclick="window.location.href='claim-restaurant.html'">For Restaurants</button>
      <button class="btn-hdr btn-pro-hdr" onclick="openProPage()">✦ Go Pro</button>
    </div>
  </div>
</header>
<nav class="cuisine-nav">
  <div class="cuisine-inner">
    <button class="cuisine-btn active" onclick="setCuisine('all',this)">All</button>
    <button class="cuisine-btn" onclick="setCuisine('italian',this)">🍝 Italian</button>
    <button class="cuisine-btn" onclick="setCuisine('japanese',this)">🍣 Japanese</button>
    <button class="cuisine-btn" onclick="setCuisine('mexican',this)">🌮 Mexican</button>
    <button class="cuisine-btn" onclick="setCuisine('american',this)">🍔 American</button>
    <button class="cuisine-btn" onclick="setCuisine('chinese',this)">🥡 Chinese</button>
    <button class="cuisine-btn" onclick="setCuisine('indian',this)">🍛 Indian</button>
    <button class="cuisine-btn" onclick="setCuisine('french',this)">🥐 French</button>
    <button class="cuisine-btn" onclick="setCuisine('thai',this)">🍜 Thai</button>
    <button class="cuisine-btn" onclick="setCuisine('steakhouse',this)">🥩 Steakhouse</button>
    <button class="cuisine-btn" onclick="setCuisine('seafood',this)">🦞 Seafood</button>
    <button class="cuisine-btn" onclick="setCuisine('pizza',this)">🍕 Pizza</button>
    <button class="cuisine-btn" onclick="setCuisine('brunch',this)">🥞 Brunch</button>
  </div>
</nav>
<div class="main">
  <div class="pro-strip">
    <div>
      <h4>✦ GetATableSpot Pro — Dine smarter every night</h4>
      <p>Real-time wait alerts · Priority reservations · AI concierge · Michelin radar</p>
    </div>
    <button class="btn-strip-pro" onclick="openProPage()">Try Free 7 Days →</button>
  </div>
  <div class="filter-row">
    <div class="filter-left">
      <button class="filter-pill" id="f-open" onclick="toggleFilter('open',this)">🟢 Open Now</button>
      <button class="filter-pill" id="f-lowwait" onclick="toggleFilter('lowwait',this)">⚡ Low Wait</button>
      <button class="filter-pill" id="f-reservable" onclick="toggleFilter('reservable',this)">📅 Reservable</button>
      <button class="filter-pill" id="f-outdoor" onclick="toggleFilter('outdoor',this)">🌿 Outdoor</button>
      <button class="filter-pill" id="f-michelin" onclick="toggleFilter('michelin',this)">⭐ Michelin</button>
      <div class="filter-pill">
        <select id="priceFilter" onchange="renderRestaurants()">
          <option value="">Any Price</option>
          <option value="$">$</option>
          <option value="$$">$$</option>
          <option value="$$$">$$$</option>
          <option value="$$$$">$$$$</option>
        </select>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="result-meta" id="resultMeta">Loading…</span>
      <select class="sort-sel" onchange="sortBy(this.value)">
        <option value="rating">Top Rated</option>
        <option value="wait">Lowest Wait</option>
        <option value="distance">Nearest</option>
        <option value="reviews">Most Reviewed</option>
      </select>
    </div>
  </div>
  <div id="gridContainer">
    <div class="restaurants-grid">
      <div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line s60"></div><div class="skel-line s40"></div><div class="skel-line"></div></div></div>
      <div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line s60"></div><div class="skel-line s40"></div><div class="skel-line"></div></div></div>
      <div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line s60"></div><div class="skel-line s40"></div><div class="skel-line"></div></div></div>
      <div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line s60"></div><div class="skel-line s40"></div><div class="skel-line"></div></div></div>
      <div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line s60"></div><div class="skel-line s40"></div><div class="skel-line"></div></div></div>
      <div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line s60"></div><div class="skel-line s40"></div><div class="skel-line"></div></div></div>
    </div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-hero" id="mHero">
      <img id="mHeroImg" src="" alt="" style="display:none" onerror="this.style.display='none'">
      <span id="mEmoji" style="position:relative;z-index:1">🍽️</span>
    </div>
    <div class="modal-body">
      <div class="modal-cuisine" id="mCuisine">CUISINE</div>
      <div class="modal-r-name" id="mName">Restaurant</div>
      <div class="r-sources" id="mSources"></div>
      <div class="modal-info-grid" id="mInfoGrid"></div>
      <div class="wait-box" id="mWaitBox"></div>
      <div id="yelpBox" style="display:none;margin-bottom:16px">
        <div style="font-size:.75rem;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Yelp Reviews</div>
        <div id="yelpList"></div>
      </div>
      <div class="divider"></div>
      <div class="section-head">Reserve a Table</div>
      <div class="time-grid" id="timeGrid"></div>
      <div class="party-sel">
        <span style="font-size:.85rem;font-weight:500;color:var(--slate)">Party size:</span>
        <div class="party-ctrl">
          <button class="p-btn" onclick="adj(-1)">−</button>
          <div class="p-num" id="pNum">2</div>
          <button class="p-btn" onclick="adj(1)">+</button>
        </div>
      </div>
      <label class="field-lbl">Your Name</label>
      <input class="field-in" id="gName" placeholder="First & Last Name">
      <label class="field-lbl">Email Address</label>
      <input class="field-in" id="gEmail" type="email" placeholder="you@example.com">
      <label class="field-lbl">Special Requests</label>
      <input class="field-in" id="gNote" placeholder="Allergies, occasion, seating preference…">
      <button class="btn-confirm" id="btnConfirm" onclick="confirmRes()">Confirm Reservation</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API='https://getatablespot-api.onrender.com/api';
const GKEY='AIzaSyB_JOErDDkAiF9PurZXwEQSHGhe_X1-m5I';
const isPro=false;
let restaurants=[],savedIds=new Set(),activeFilters=new Set();
let currentCuisine='all',searchQ='',currentSort='rating';
let partySize=2,selectedTime=null,currentR=null;
let currentLat=40.7128,currentLng=-74.0060;

const MOCK=[

const SRCS={yelp:{label:'Yelp',cls:'rs-yelp'},google:{label:'Google',cls:'rs-google'},opentable:{label:'OpenTable',cls:'rs-opentable'},resy:{label:'Resy',cls:'rs-resy'},tock:{label:'Tock',cls:'rs-tock'}};

async function geocode(query){
  try{
    const r=await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(query)}&key=${GKEY}`);
    const d=await r.json();
    if(d.results?.length){
      const loc=d.results[0].geometry.location;
      return{lat:loc.lat,lng:loc.lng,label:d.results[0].formatted_address};
    }
  }catch{}
  return null;
}

async function load(lat,lng){
  showSkeletons();
  try{
    const r=await fetch(`${API}/venues?lat=${lat}&lng=${lng}`,{signal:AbortSignal.timeout(10000)});
    const d=await r.json();
    restaurants=d.venues?.length?d.venues:MOCK;
  }catch{restaurants=MOCK;}
  renderRestaurants();
}

function showSkeletons(){
  document.getElementById('gridContainer').innerHTML=`<div class="restaurants-grid">${[...Array(6)].map(()=>`<div class="skel"><div class="skel-img"></div><div class="skel-body"><div class="skel-line s60"></div><div class="skel-line s40"></div><div class="skel-line"></div></div></div>`).join('')}</div>`;
  document.getElementById('resultMeta').textContent='Loading…';
}

function getFiltered(){
  const priceF=document.getElementById('priceFilter').value;
  return restaurants.filter(r=>{
    if(activeFilters.has('open')&&!r.isOpen)return false;
    if(activeFilters.has('lowwait')&&!['low','none'].includes(r.waitLevel))return false;
    if(activeFilters.has('reservable')&&!r.reservable)return false;
    if(activeFilters.has('outdoor')&&!r.outdoor)return false;
    if(activeFilters.has('michelin')&&!r.michelin)return false;
    if(priceF&&r.price!==priceF)return false;
    if(currentCuisine!=='all'&&r.cuisine.toLowerCase()!==currentCuisine)return false;
    if(searchQ){const q=searchQ.toLowerCase();if(![r.name,...(r.tags||[]),r.cuisine].some(s=>s.toLowerCase().includes(q)))return false;}
    return true;
  });
}

function getSorted(list){
  return[...list].sort((a,b)=>{
    if(b.isFeatured!==a.isFeatured)return b.isFeatured-a.isFeatured;
    if(currentSort==='rating')return b.rating-a.rating;
    if(currentSort==='wait')return(a.waitMins??999)-(b.waitMins??999);
    if(currentSort==='reviews')return b.reviews-a.reviews;
    if(currentSort==='distance')return parseFloat(a.distance)-parseFloat(b.distance);
    return 0;
  });
}

function wtClass(lv){return{none:'wt-none',low:'wt-low',med:'wt-med',high:'wt-high'}[lv]||'wt-low'}
function wtText(r){if(!r.isOpen)return'— Closed';if(r.waitMins===0||r.waitLevel==='none')return'✓ Seated Now';return`~${r.waitMins}m wait`;}
function starsStr(r){const f=Math.floor(r);return'★'.repeat(f)+(r%1>=.5?'½':'')+'☆'.repeat(5-f-(r%1>=.5?1:0))}

function cardHTML(r,delay=0){
  const srcs=(r.sources||[]).map(s=>SRCS[s]?`<span class="r-src ${SRCS[s].cls}">${SRCS[s].label}</span>`:'').join('');
  const tags=(r.tags||[]).slice(0,3).map(t=>`<span class="r-tag">${t}</span>`).join('');
  const bookBtn=r.reservable?`<button class="btn-book${r.isFeatured?' gold':''}" onclick="event.stopPropagation();openModal('${r.id}')">Reserve →</button>`:`<button class="btn-book" style="background:var(--warm);color:var(--slate);border:1px solid var(--border)" onclick="event.stopPropagation();openModal('${r.id}')">View Details</button>`;
  return`<div class="r-card${r.isFeatured?' is-featured':''}" onclick="openModal('${r.id}')" style="animation-delay:${delay}ms">
    <div class="r-card-img" style="background:${r.bg||'linear-gradient(135deg,#1A1A1A,#333)'}">
      ${r.photoUrl?`<img src="${r.photoUrl.trim()}" alt="${r.name}" onerror="this.style.display='none'">`:''}
      <span style="position:relative;z-index:1">${r.emoji||'🍽️'}</span>
      ${r.isFeatured?'<div class="r-featured-tag">✦ Featured</div>':''}
      <div class="r-wait-tag ${wtClass(r.waitLevel)}"><span class="wt-dot"></span>${wtText(r)}</div>
      <button class="r-save-btn" onclick="event.stopPropagation();toggleSave('${r.id}',this)">${savedIds.has(r.id)?'♥':'♡'}</button>
    </div>
    <div class="r-body">
      <div class="r-sources">${srcs}</div>
      <div class="r-cuisine">${(r.cuisine||'restaurant').toUpperCase()}</div>
      <div class="r-name">${r.name}</div>
      <div class="r-meta"><span class="r-stars">${starsStr(r.rating)}</span><span style="font-size:.77rem;color:var(--slate)">(${(r.reviews||r.reviewCount||0).toLocaleString()})</span><span class="r-price">${r.price||'$$'}</span><span class="r-dist">📍 ${r.distance||'nearby'}</span>${r.michelin?'<span style="font-size:.72rem;color:var(--gold-dark);font-weight:600">⭐ Michelin</span>':''}</div>
      <div class="r-tags">${tags}</div>
      <div class="r-actions" onclick="event.stopPropagation()">${bookBtn}<button class="btn-sm" onclick="showToast('Opening directions…')">↗</button><button class="btn-sm" onclick="showToast('Link copied!')">⎘</button></div>
    </div>
  </div>`;
}

function renderRestaurants(){
  const filtered=getSorted(getFiltered());
  document.getElementById('resultMeta').innerHTML=`<strong>${filtered.length}</strong> restaurants`;
  if(!filtered.length){document.getElementById('gridContainer').innerHTML='<div class="empty"><div class="empty-title">No restaurants found</div><p>Try adjusting your filters.</p></div>';return;}
  document.getElementById('gridContainer').innerHTML=`<div class="restaurants-grid">${filtered.map((r,i)=>cardHTML(r,i*40)).join('')}</div>`;
}

async function openModal(id){
  currentR=restaurants.find(r=>r.id===id);
  if(!currentR)return;
  selectedTime=null;partySize=2;
  const heroImg=document.getElementById('mHeroImg');
  const heroEmoji=document.getElementById('mEmoji');
  document.getElementById('mHero').style.background=currentR.bg||'linear-gradient(135deg,#1A1A1A,#333)';
  if(currentR.photoUrl){heroImg.src=currentR.photoUrl.trim();heroImg.style.display='block';heroEmoji.style.display='none';}
  else{heroImg.style.display='none';heroEmoji.style.display='block';heroEmoji.textContent=currentR.emoji||'🍽️';}
  document.getElementById('mCuisine').textContent=(currentR.cuisine||'restaurant').toUpperCase();
  document.getElementById('mName').textContent=currentR.name;
  document.getElementById('mSources').innerHTML=(currentR.sources||[]).map(s=>SRCS[s]?`<span class="r-src ${SRCS[s].cls}">${SRCS[s].label}</span>`:'').join('');
  document.getElementById('pNum').textContent=partySize;
  document.getElementById('gName').value='';
  document.getElementById('gEmail').value='';
  document.getElementById('gNote').value='';
  const addr=currentR.address||'Address not available';
  const hrs=Array.isArray(currentR.hours)?currentR.hours[0]||'See Google Maps':currentR.hours||'See Google Maps';
  document.getElementById('mInfoGrid').innerHTML=[{label:'Address',val:`📍 ${addr}`},{label:'Hours',val:`🕐 ${hrs}`},{label:'Phone',val:`📞 ${currentR.phone||'Not listed'}`},{label:'Rating',val:`${starsStr(currentR.rating)} ${currentR.rating}`}].map(({label,val})=>`<div class="m-info-box"><div class="m-info-label">${label}</div><div class="m-info-val">${val}</div></div>`).join('');
  const wc={none:'wb-green',low:'wb-green',med:'wb-yellow',high:'wb-red'}[currentR.waitLevel]||'wb-yellow';
  const wt=!currentR.isOpen?'Currently closed':currentR.waitMins===0?'No wait — walk right in':`~${currentR.waitMins} minute wait`;
  document.getElementById('mWaitBox').innerHTML=`<div style="font-size:1.6rem">⏱</div><div><div class="wb-label">LIVE WAIT TIME</div><div class="wb-val ${wc}">${wt}</div></div>`;
  if(currentR.yelpReviews?.length){document.getElementById('yelpBox').style.display='block';document.getElementById('yelpList').innerHTML=currentR.yelpReviews.map(rv=>`<div class="yelp-rev"><div class="yr-stars">${'★'.repeat(rv.stars)}</div><div class="yr-text">"${rv.text}"</div><div class="yr-author">— ${rv.author} via Yelp</div></div>`).join('');}
  else{document.getElementById('yelpBox').style.display='none';}
  let slots=currentR.times||[],fullSlots=currentR.fullSlots||[];
  try{
    const sr=await fetch(`${API}/venues/${currentR.id}/slots?date=${new Date().toISOString().split('T')[0]}`,{signal:AbortSignal.timeout(3000)});
    const sd=await sr.json();
    if(sd.slots?.length){slots=sd.slots.map(s=>s.time);fullSlots=sd.slots.reduce((a,s,i)=>{if(!s.available)a.push(i);return a;},[]);}
  }catch{}
  if(currentR.reservable&&slots.length){
    document.getElementById('timeGrid').innerHTML=slots.map((t,i)=>{const full=fullSlots.includes(i);return`<button class="t-btn${full?' full':''}" data-time="${t}" onclick="${full?'':'selectTime(this)'}">${t}${full?'<br><small>Full</small>':''}</button>`;}).join('');
    document.getElementById('btnConfirm').style.display='block';
  }else{
    document.getElementById('timeGrid').innerHTML='<div style="color:var(--slate);font-size:.85rem;grid-column:1/-1;padding:8px 0">Walk-in only — no reservation needed.</div>';
    document.getElementById('btnConfirm').style.display='none';
  }
  document.getElementById('overlay').classList.add('open');
}

function selectTime(btn){document.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');selectedTime=btn.dataset.time;}
function closeModal(e){if(e&&e.target!==document.getElementById('overlay'))return;document.getElementById('overlay').classList.remove('open');}
function adj(d){partySize=Math.max(1,Math.min(20,partySize+d));document.getElementById('pNum').textContent=partySize;}

async function confirmRes(){
  const name=document.getElementById('gName').value.trim();
  const email=document.getElementById('gEmail').value.trim();
  if(!name){showToast('Please enter your name');return;}
  if(!email){showToast('Please enter your email');return;}
  if(!selectedTime){showToast('Please select a time');return;}
  document.getElementById('btnConfirm').textContent='Confirming…';
  document.getElementById('btnConfirm').disabled=true;
  try{await fetch(`${API}/reservations`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({venueId:currentR.id,time:selectedTime,partySize,guestName:name,guestEmail:email}),signal:AbortSignal.timeout(5000)});}catch{}
  closeModal();
  setTimeout(()=>{showToast(`Confirmed at ${currentR.name} — ${selectedTime} for ${partySize}`);document.getElementById('btnConfirm').textContent='Confirm Reservation';document.getElementById('btnConfirm').disabled=false;},200);
}

function toggleSave(id,btn){if(savedIds.has(id)){savedIds.delete(id);btn.textContent='♡';showToast('Removed from saved');}else{savedIds.add(id);btn.textContent='♥';showToast('Saved to your list');}}
function toggleFilter(f,btn){if(activeFilters.has(f)){activeFilters.delete(f);btn.classList.remove('on');}else{activeFilters.add(f);btn.classList.add('on');}renderRestaurants();}
function setCuisine(c,btn){currentCuisine=c;document.querySelectorAll('.cuisine-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderRestaurants();}
let _st;
function onSearch(){clearTimeout(_st);searchQ=document.getElementById('searchInput').value;_st=setTimeout(renderRestaurants,250);}

async function doSearch(){
  const locQuery=document.getElementById('locationInput').value.trim();
  const searchQuery=document.getElementById('searchInput').value.trim();
  if(locQuery){
    showToast('Searching '+locQuery+'…');
    const loc=await geocode(locQuery);
    if(loc){
      currentLat=loc.lat;currentLng=loc.lng;
      await load(loc.lat,loc.lng);
      showToast('Showing restaurants in '+loc.label);
    }else{
      showToast('Location not found. Try a different city.');
    }
  }else if(searchQuery){
    renderRestaurants();
  }else{
    load(currentLat,currentLng);
  }
}

function sortBy(v){currentSort=v;renderRestaurants();}
function openProPage(){window.location.href='pro-subscription.html';}

let _tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3200);}

if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    p=>{currentLat=p.coords.latitude;currentLng=p.coords.longitude;load(currentLat,currentLng);},
    ()=>load(currentLat,currentLng)
  );
}else{load(currentLat,currentLng);}
</script>
